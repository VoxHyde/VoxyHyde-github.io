<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Quest: 56 Levels</title>
    <style>
        :root {
            color-scheme: dark;
            --panel: rgba(8, 14, 24, 0.78);
            --border: rgba(255, 255, 255, 0.12);
            --text: #eef7ff;
            --muted: rgba(238, 247, 255, 0.72);
            --accent: #7df5c6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(79, 131, 255, 0.25), transparent 40%),
                linear-gradient(180deg, #121823 0%, #090d14 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
        }

        .hud {
            width: min(920px, calc(100vw - 24px));
            margin-top: 14px;
            display: grid;
            grid-template-columns: 1.3fr 1fr 1fr;
            gap: 12px;
        }

        .card {
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        }

        .card h1,
        .card h2,
        .card p {
            margin: 0;
        }

        #levelTitle {
            font-size: 1.45rem;
            margin-bottom: 6px;
        }

        #levelHint,
        #comfortText,
        #progressText {
            color: var(--muted);
            margin-top: 6px;
        }

        canvas {
            width: min(920px, calc(100vw - 24px));
            height: auto;
            margin: 14px 0 22px;
            border: 5px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            background: linear-gradient(180deg, #1d2331 0%, #171c27 100%);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
        }

        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(3, 6, 10, 0.7);
            backdrop-filter: blur(10px);
            z-index: 10;
            padding: 20px;
        }

        .overlay.open {
            display: flex;
        }

        .menu {
            width: min(560px, 100%);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: linear-gradient(180deg, rgba(25, 33, 45, 0.96), rgba(10, 14, 20, 0.96));
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        }

        .menu h2 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .menu p {
            margin: 0 0 18px;
            color: var(--muted);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .setting {
            padding: 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .setting label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input[type="range"] {
            width: 100%;
        }

        .value {
            margin-top: 8px;
            color: #ffd978;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), #61b7ff);
            color: #071018;
            font-weight: 700;
            cursor: pointer;
        }

        button.alt {
            background: linear-gradient(135deg, #ffb36f, #ff7d70);
        }

        @media (max-width: 760px) {
            .hud {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="card">
            <h1 id="levelTitle">Level 1: The Beginning</h1>
            <p id="levelHint">Red uses WASD. Blue uses Arrow keys. Reach both doors together.</p>
        </div>
        <div class="card">
            <h2 id="timerText">Time 00:00.0</h2>
            <p id="progressText">Level 1 / 56</p>
        </div>
        <div class="card">
            <h2>Comfort</h2>
            <p id="comfortText">R reset, N next, P previous, Esc pause, F fullscreen.</p>
        </div>
    </div>

    <canvas id="gameCanvas" width="920" height="520"></canvas>

    <div id="pauseOverlay" class="overlay">
        <div class="menu">
            <h2>Paused</h2>
            <p>Take a breath, tweak the view, or jump to another level while you test the campaign.</p>
            <div class="menu-grid">
                <div class="setting">
                    <label for="zoomSlider">Camera Zoom</label>
                    <input id="zoomSlider" type="range" min="0.85" max="1.25" step="0.05" value="1">
                    <div id="zoomValue" class="value">100%</div>
                </div>
                <div class="setting">
                    <label for="speedSlider">Player Speed</label>
                    <input id="speedSlider" type="range" min="0.8" max="1.35" step="0.05" value="1">
                    <div id="speedValue" class="value">100%</div>
                </div>
                <div class="setting">
                    <label for="jumpSlider">Jump Height</label>
                    <input id="jumpSlider" type="range" min="0.55" max="2" step="0.05" value="1">
                    <div id="jumpValue" class="value">100%</div>
                </div>
                <div class="setting">
                    <label for="levelSelect">Jump To Level</label>
                    <input id="levelSelect" type="range" min="1" max="56" step="1" value="1">
                    <div id="levelValue" class="value">Level 1</div>
                </div>
            </div>
            <div class="buttons">
                <button id="resumeBtn">Resume</button>
                <button id="resetBtn">Restart Level</button>
                <button id="fullscreenBtn">Fullscreen</button>
                <button id="jumpBtn" class="alt">Go To Selected Level</button>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const gravity = 0.52;
const levelNames = [
    "The Beginning", "Bridge Gap", "Twin Towers", "Split Stream", "Fire Ledge", "Water Walk",
    "Step Ladder", "Stack Trial", "Broken Causeway", "Crosswind", "Hazard Hall", "Double Basin",
    "Rising Steps", "Mirror Route", "Crater Pass", "Gate Climb", "Blue Basin", "Red Ridge",
    "Tower Switch", "Twin Wells", "Narrow Escape", "Stepping Lake", "Molten Run", "Waterfall Path",
    "Split Summit", "Cliff Transit", "Heat Pocket", "Frozen Span", "Stair Sprint", "Twin Vaults",
    "Middle Maze", "Cascade Jump", "Burn Line", "Flood Line", "Crossroads", "High Balcony",
    "Central Shaft", "Echo Chamber", "Gap Garden", "Lava Spine", "Water Spine", "Bridge Factory",
    "Climbworks", "Hazard Crown", "Rift Relay", "Elevated Pair", "Blue Echo", "Red Echo",
    "Split Arena", "Tight Spiral", "Final Stretch", "Last Basins", "Tower Finale", "Relay Peak",
    "Summit Doors", "Element Quest Finale"
];

const ui = {
    levelTitle: document.getElementById('levelTitle'),
    levelHint: document.getElementById('levelHint'),
    timerText: document.getElementById('timerText'),
    progressText: document.getElementById('progressText'),
    pauseOverlay: document.getElementById('pauseOverlay'),
    zoomSlider: document.getElementById('zoomSlider'),
    zoomValue: document.getElementById('zoomValue'),
    speedSlider: document.getElementById('speedSlider'),
    speedValue: document.getElementById('speedValue'),
    jumpSlider: document.getElementById('jumpSlider'),
    jumpValue: document.getElementById('jumpValue'),
    levelSelect: document.getElementById('levelSelect'),
    levelValue: document.getElementById('levelValue'),
    resumeBtn: document.getElementById('resumeBtn'),
    resetBtn: document.getElementById('resetBtn'),
    fullscreenBtn: document.getElementById('fullscreenBtn'),
    jumpBtn: document.getElementById('jumpBtn')
};

const settings = {
    zoom: 1,
    speed: 1,
    jump: 1
};

let currentLevel = 0;
let isPaused = false;
let levelStartTime = performance.now();
const keys = {};
let enemyState = [];

function formatTime(ms) {
    const totalSeconds = ms / 1000;
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${String(minutes).padStart(2, '0')}:${seconds.toFixed(1).padStart(4, '0')}`;
}

function createGoals(y) {
    return { p1: { x: 780, y }, p2: { x: 830, y } };
}

function baseLevel(title) {
    return {
        title,
        hint: "Both players always have a route. Stacking helps on some shortcuts but is never mandatory.",
        platforms: [{ x: 0, y: 470, w: 920, h: 50 }],
        hazards: [],
        enemies: [],
        goals: createGoals(410)
    };
}

function makeLevel(index) {
    const stage = index + 1;
    const level = baseLevel(`Level ${stage}: ${levelNames[index]}`);
    const variant = index % 7;
    const topY = 410 - Math.min(220, Math.floor(index / 3) * 8);
    const difficulty = Math.min(1, index / 55);

    if (stage === 1) {
        level.platforms.push({ x: 180, y: 390, w: 150, h: 18 }, { x: 400, y: 340, w: 150, h: 18 }, { x: 620, y: 290, w: 140, h: 18 });
        level.goals = createGoals(240);
        level.hint = "Warm-up stage. Use the stairs and learn the timing.";
        return level;
    }

    if (variant === 0) {
        level.platforms.push(
            { x: 120, y: 400, w: 120 - difficulty * 18, h: 18 },
            { x: 280, y: 340, w: 120 - difficulty * 14, h: 18 },
            { x: 440, y: 280, w: 120 - difficulty * 12, h: 18 },
            { x: 610, y: 220, w: 130 - difficulty * 15, h: 18 }
        );
        level.hazards.push(
            { x: 230, y: 490, w: 130, h: 18, type: 'water' },
            { x: 500, y: 490, w: 150, h: 18, type: 'lava' }
        );
        level.goals = createGoals(170);
    } else if (variant === 1) {
        level.platforms.push(
            { x: 100, y: 380, w: 170 - difficulty * 24, h: 18 },
            { x: 340, y: 310, w: 130 - difficulty * 18, h: 18 },
            { x: 540, y: 240, w: 170 - difficulty * 24, h: 18 }
        );
        level.platforms.push({ x: 720, y: 180, w: 100, h: 18 });
        level.hazards.push(
            { x: 270, y: 490, w: 100, h: 18, type: 'lava' },
            { x: 470, y: 490, w: 100, h: 18, type: 'water' }
        );
        level.goals = createGoals(130);
    } else if (variant === 2) {
        level.platforms.push(
            { x: 70, y: 390, w: 150 - difficulty * 18, h: 18 },
            { x: 270, y: 390, w: 140 - difficulty * 18, h: 18 },
            { x: 460, y: 310, w: 150 - difficulty * 18, h: 18 },
            { x: 670, y: 230, w: 120 - difficulty * 15, h: 18 }
        );
        level.hazards.push(
            { x: 220, y: 490, w: 50, h: 18, type: 'water' },
            { x: 410, y: 490, w: 50, h: 18, type: 'lava' },
            { x: 610, y: 490, w: 60, h: 18, type: stage % 2 === 0 ? 'water' : 'lava' }
        );
        level.goals = createGoals(180);
    } else if (variant === 3) {
        level.platforms.push(
            { x: 130, y: 420, w: 110 - difficulty * 12, h: 18 },
            { x: 260, y: 350, w: 110 - difficulty * 12, h: 18 },
            { x: 390, y: 280, w: 110 - difficulty * 12, h: 18 },
            { x: 520, y: 350, w: 110 - difficulty * 12, h: 18 },
            { x: 650, y: 280, w: 110 - difficulty * 12, h: 18 }
        );
        level.hazards.push(
            { x: 240, y: 490, w: 120, h: 18, type: 'water' },
            { x: 500, y: 490, w: 120, h: 18, type: 'lava' }
        );
        level.goals = createGoals(230);
        level.hint = "Stacking gives a shortcut here, but the upper route is still reachable without it.";
    } else if (variant === 4) {
        level.platforms.push(
            { x: 90, y: 350, w: 170 - difficulty * 22, h: 18 },
            { x: 340, y: 270, w: 110 - difficulty * 14, h: 18 },
            { x: 520, y: 270, w: 110 - difficulty * 14, h: 18 },
            { x: 690, y: 190, w: 110 - difficulty * 14, h: 18 }
        );
        level.platforms.push({ x: 330, y: 180, w: 90, h: 16 });
        level.hazards.push(
            { x: 260, y: 490, w: 80, h: 18, type: 'lava' },
            { x: 450, y: 490, w: 70, h: 18, type: 'water' },
            { x: 630, y: 490, w: 60, h: 18, type: 'lava' }
        );
        level.goals = createGoals(140);
    } else if (variant === 5) {
        level.platforms.push(
            { x: 110, y: 410, w: 100 - difficulty * 12, h: 18 },
            { x: 250, y: 330, w: 100 - difficulty * 12, h: 18 },
            { x: 390, y: 250, w: 100 - difficulty * 12, h: 18 },
            { x: 530, y: 170, w: 100 - difficulty * 12, h: 18 },
            { x: 680, y: 250, w: 110 - difficulty * 12, h: 18 }
        );
        level.hazards.push(
            { x: 210, y: 490, w: 110, h: 18, type: 'water' },
            { x: 350, y: 490, w: 110, h: 18, type: 'lava' },
            { x: 620, y: 490, w: 60, h: 18, type: 'water' }
        );
        level.goals = createGoals(200);
    } else {
        level.platforms.push(
            { x: 140, y: 390, w: 120 - difficulty * 16, h: 18 },
            { x: 320, y: 320, w: 120 - difficulty * 16, h: 18 },
            { x: 500, y: 250, w: 120 - difficulty * 16, h: 18 },
            { x: 700, y: 180, w: 100 - difficulty * 14, h: 18 }
        );
        level.platforms.push({ x: 540, y: 360, w: 80, h: 16 });
        level.hazards.push(
            { x: 260, y: 490, w: 120, h: 18, type: 'lava' },
            { x: 440, y: 490, w: 120, h: 18, type: 'water' }
        );
        level.goals = createGoals(130);
    }

    if (stage >= 16) {
        level.platforms.push({ x: 30 + (stage * 17 % 160), y: Math.max(165, topY), w: 85, h: 16 });
    }

    if (stage >= 28) {
        level.platforms.push({ x: 610 - (stage * 9 % 180), y: Math.max(130, topY - 38), w: 80, h: 16 });
    }

    if (stage >= 40) {
        level.hazards.push({ x: 370, y: 490, w: 80, h: 18, type: stage % 2 === 0 ? 'lava' : 'water' });
    }

    if (stage >= 18 && stage % 6 === 0) {
        level.enemies.push({
            x: 250,
            y: 444,
            w: 26,
            h: 26,
            minX: 220,
            maxX: 520,
            speed: 1.4 + difficulty * 1.4
        });
    }

    if (stage >= 31 && stage % 9 === 0) {
        level.enemies.push({
            x: 560,
            y: 214,
            w: 24,
            h: 24,
            minX: 520,
            maxX: 760,
            speed: 1.2 + difficulty * 1.5
        });
    }

    if (stage === 22) {
        level.platforms = [
            { x: 0, y: 470, w: 220, h: 50 },
            { x: 280, y: 380, w: 90, h: 18 },
            { x: 455, y: 275, w: 84, h: 18 },
            { x: 655, y: 165, w: 90, h: 18 }
        ];
        level.hazards = [
            { x: 220, y: 490, w: 60, h: 18, type: 'water' },
            { x: 370, y: 490, w: 85, h: 18, type: 'lava' },
            { x: 540, y: 490, w: 110, h: 18, type: 'water' }
        ];
        level.enemies = [];
        level.goals = createGoals(115);
        level.hint = "Special jump stage. Crank jump to 200% to reach the high final route.";
    }

    if (stage === 37) {
        level.platforms = [
            { x: 0, y: 470, w: 180, h: 50 },
            { x: 210, y: 424, w: 180, h: 14 },
            { x: 445, y: 384, w: 155, h: 14 },
            { x: 655, y: 350, w: 120, h: 14 }
        ];
        level.hazards = [
            { x: 180, y: 490, w: 30, h: 18, type: 'lava' },
            { x: 390, y: 490, w: 50, h: 18, type: 'water' },
            { x: 600, y: 490, w: 45, h: 18, type: 'lava' }
        ];
        level.enemies = [{
            x: 470,
            y: 358,
            w: 22,
            h: 22,
            minX: 445,
            maxX: 590,
            speed: 1.8
        }];
        level.goals = createGoals(300);
        level.hint = "Low-jump precision stage. Lower jump or you'll overshoot the tight landings.";
    }

    if (stage === 56) {
        level.platforms = [
            { x: 0, y: 470, w: 170, h: 50 },
            { x: 210, y: 400, w: 120, h: 18 },
            { x: 370, y: 330, w: 120, h: 18 },
            { x: 530, y: 260, w: 120, h: 18 },
            { x: 700, y: 190, w: 120, h: 18 }
        ];
        level.hazards = [
            { x: 170, y: 490, w: 80, h: 18, type: 'water' },
            { x: 250, y: 490, w: 100, h: 18, type: 'lava' },
            { x: 350, y: 490, w: 110, h: 18, type: 'water' },
            { x: 460, y: 490, w: 110, h: 18, type: 'lava' },
            { x: 570, y: 490, w: 120, h: 18, type: 'water' }
        ];
        level.goals = { p1: { x: 790, y: 130 }, p2: { x: 840, y: 130 } };
        level.hint = "Finale. Both routes are clearable, but clean movement and teamwork still matter.";
        level.enemies.push(
            { x: 225, y: 374, w: 24, h: 24, minX: 210, maxX: 320, speed: 2.2 },
            { x: 545, y: 234, w: 24, h: 24, minX: 530, maxX: 640, speed: 2.35 }
        );
    }

    return level;
}

const levels = Array.from({ length: 56 }, (_, index) => makeLevel(index));

class Player {
    constructor(color, controls, startX) {
        this.color = color;
        this.controls = controls;
        this.startX = startX;
        this.reset();
    }

    reset() {
        this.x = this.startX;
        this.y = 390;
        this.w = 30;
        this.h = 30;
        this.vx = 0;
        this.vy = 0;
        this.grounded = false;
        this.inGoal = false;
    }

    overlaps(rect) {
        return this.x < rect.x + rect.w && this.x + this.w > rect.x &&
               this.y < rect.y + rect.h && this.y + this.h > rect.y;
    }

    landOn(rect) {
        if (this.overlaps(rect) && this.vy > 0 && this.y + this.h - this.vy <= rect.y) {
            this.y = rect.y - this.h;
            this.vy = 0;
            this.grounded = true;
            return true;
        }
        return false;
    }

    update(level, otherPlayer) {
        const isRed = this.color === '#ff5555';
        const moveSpeed = 4.2 * settings.speed;
        if (keys[this.controls.left]) this.vx = -moveSpeed;
        else if (keys[this.controls.right]) this.vx = moveSpeed;
        else this.vx = 0;

        if (keys[this.controls.up] && this.grounded) {
            this.vy = -11 * settings.jump;
            this.grounded = false;
        }

        this.vy += gravity;
        this.x += this.vx;
        this.y += this.vy;

        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));

        this.grounded = false;
        level.platforms.forEach(platform => this.landOn(platform));
        this.landOn({ x: otherPlayer.x, y: otherPlayer.y, w: otherPlayer.w, h: otherPlayer.h });

        for (const hazard of level.hazards) {
            const shouldDie = (isRed && hazard.type === 'water') || (!isRed && hazard.type === 'lava');

            if (shouldDie && this.overlaps(hazard)) {
                restartLevel();
                return;
            }

            if (!shouldDie) {
                this.landOn(hazard);
            }
        }

        const goal = this.color === '#ff5555' ? level.goals.p1 : level.goals.p2;
        this.inGoal = this.x < goal.x + 40 && this.x + this.w > goal.x &&
                      this.y < goal.y + 50 && this.y + this.h > goal.y;

        if (this.y > canvas.height + 80) {
            restartLevel();
        }
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        if (this.inGoal) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.strokeRect(this.x, this.y, this.w, this.h);
        }
    }
}

const red = new Player('#ff5555', { left: 'KeyA', right: 'KeyD', up: 'KeyW' }, 40);
const blue = new Player('#4a76ff', { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp' }, 90);

function syncMenuValues() {
    ui.zoomValue.textContent = `${Math.round(settings.zoom * 100)}%`;
    ui.speedValue.textContent = `${Math.round(settings.speed * 100)}%`;
    ui.jumpValue.textContent = `${Math.round(settings.jump * 100)}%`;
    ui.levelValue.textContent = `Level ${ui.levelSelect.value}`;
}

function restartLevel() {
    red.reset();
    blue.reset();
    const level = levels[currentLevel];
    enemyState = level.enemies.map(enemy => ({ ...enemy, dir: 1 }));
    levelStartTime = performance.now();
}

function loadLevel(index) {
    if (index >= levels.length) {
        alert('You cleared all 56 levels!');
        index = 0;
    }
    currentLevel = Math.max(0, Math.min(levels.length - 1, index));
    ui.levelTitle.textContent = levels[currentLevel].title;
    ui.levelHint.textContent = levels[currentLevel].hint;
    ui.progressText.textContent = `Level ${currentLevel + 1} / ${levels.length}`;
    ui.levelSelect.value = currentLevel + 1;
    syncMenuValues();
    restartLevel();
}

function setPaused(next) {
    isPaused = next;
    ui.pauseOverlay.classList.toggle('open', next);
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
    } else {
        document.exitFullscreen?.();
    }
}

window.addEventListener('keydown', (event) => {
    keys[event.code] = true;

    if (event.code === 'Escape') {
        event.preventDefault();
        setPaused(!isPaused);
        return;
    }

    if (event.code === 'KeyR') {
        restartLevel();
        return;
    }

    if (event.code === 'KeyF') {
        toggleFullscreen();
        return;
    }

    if (event.code === 'KeyN') {
        loadLevel(currentLevel + 1);
        return;
    }

    if (event.code === 'KeyP') {
        loadLevel(currentLevel - 1);
    }
});

window.addEventListener('keyup', (event) => {
    keys[event.code] = false;
});

ui.zoomSlider.addEventListener('input', () => {
    settings.zoom = Number(ui.zoomSlider.value);
    syncMenuValues();
});

ui.speedSlider.addEventListener('input', () => {
    settings.speed = Number(ui.speedSlider.value);
    syncMenuValues();
});

ui.jumpSlider.addEventListener('input', () => {
    settings.jump = Number(ui.jumpSlider.value);
    syncMenuValues();
});

ui.levelSelect.addEventListener('input', () => {
    syncMenuValues();
});

ui.resumeBtn.addEventListener('click', () => setPaused(false));
ui.resetBtn.addEventListener('click', () => restartLevel());
ui.fullscreenBtn.addEventListener('click', () => toggleFullscreen());
ui.jumpBtn.addEventListener('click', () => {
    loadLevel(Number(ui.levelSelect.value) - 1);
    setPaused(false);
});

function drawBackground(level) {
    const zoom = settings.zoom;
    if (zoom !== 1) {
        ctx.save();
        ctx.translate(canvas.width * (1 - zoom) / 2, canvas.height * (1 - zoom) / 2);
        ctx.scale(zoom, zoom);
    }

    ctx.fillStyle = '#21293a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#161c28';
    for (let i = 0; i < 8; i++) {
        ctx.fillRect(i * 130 - 20, 80 + (i % 2) * 30, 90, 260);
    }

    level.hazards.forEach((hazard) => {
        ctx.fillStyle = hazard.type === 'lava' ? '#ff5e2f' : '#2fb7ff';
        ctx.fillRect(hazard.x, hazard.y, hazard.w, hazard.h);
        ctx.fillStyle = hazard.type === 'lava' ? '#ff926e' : '#91e2ff';
        ctx.fillRect(hazard.x, hazard.y, hazard.w, 5);
    });

    enemyState.forEach((enemy) => {
        ctx.fillStyle = '#d5ff65';
        ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
        ctx.fillStyle = '#394513';
        ctx.fillRect(enemy.x + 4, enemy.y + 6, 4, 4);
        ctx.fillRect(enemy.x + enemy.w - 8, enemy.y + 6, 4, 4);
    });

    ctx.fillStyle = '#586170';
    level.platforms.forEach((platform) => {
        ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
        ctx.fillStyle = '#747e8d';
        ctx.fillRect(platform.x, platform.y, platform.w, 4);
        ctx.fillStyle = '#586170';
    });

    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ff5555';
    ctx.fillRect(level.goals.p1.x, level.goals.p1.y, 40, 50);
    ctx.fillStyle = '#4a76ff';
    ctx.fillRect(level.goals.p2.x, level.goals.p2.y, 40, 50);
    ctx.globalAlpha = 1;

    if (zoom !== 1) ctx.restore();
}

function drawPlayers() {
    const zoom = settings.zoom;
    if (zoom !== 1) {
        ctx.save();
        ctx.translate(canvas.width * (1 - zoom) / 2, canvas.height * (1 - zoom) / 2);
        ctx.scale(zoom, zoom);
    }
    red.draw();
    blue.draw();
    if (zoom !== 1) ctx.restore();
}

function gameLoop() {
    requestAnimationFrame(gameLoop);

    const level = levels[currentLevel];
    drawBackground(level);

    if (!isPaused) {
        red.update(level, blue);
        blue.update(level, red);

        enemyState.forEach((enemy) => {
            enemy.x += enemy.speed * enemy.dir;
            if (enemy.x <= enemy.minX || enemy.x + enemy.w >= enemy.maxX) {
                enemy.dir *= -1;
                enemy.x = Math.max(enemy.minX, Math.min(enemy.maxX - enemy.w, enemy.x));
            }
        });

        for (const player of [red, blue]) {
            for (const enemy of enemyState) {
                const hit =
                    player.x < enemy.x + enemy.w &&
                    player.x + player.w > enemy.x &&
                    player.y < enemy.y + enemy.h &&
                    player.y + player.h > enemy.y;
                if (hit) {
                    restartLevel();
                    break;
                }
            }
        }
    }

    drawPlayers();

    if (!isPaused) {
        const elapsed = performance.now() - levelStartTime;
        ui.timerText.textContent = `Time ${formatTime(elapsed)}`;
    }

    if (!isPaused && red.inGoal && blue.inGoal) {
        loadLevel(currentLevel + 1);
    }
}

syncMenuValues();
loadLevel(0);
gameLoop();
</script>
