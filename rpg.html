<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON PIXEL VALLEY</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            image-rendering: pixelated; font-family: 'Courier New', Courier, monospace;
        }
        #viewport {
            position: relative; width: 800px; height: 600px;
            border: 8px solid #1a1a2e; outline: 2px solid #00f2ff;
        }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        /* UI ELEMENTS */
        .ui-layer { position: absolute; inset: 0; pointer-events: none; padding: 20px; color: #00f2ff; text-shadow: 2px 2px #000; }
        .bar { width: 120px; height: 10px; border: 2px solid #fff; margin: 4px 0; background: #222; position: relative; }
        .fill { height: 100%; transition: width 0.2s; }
        
        #shop {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a1a; border: 4px solid #ff00ff; padding: 20px;
            display: none; pointer-events: all; text-align: center; z-index: 100;
        }
        .btn { background: #ff00ff; color: #fff; border: none; padding: 8px; margin: 5px; cursor: pointer; font-family: inherit; }
        .active-slot { border: 2px solid #ff00ff !important; transform: scale(1.1); }
        #hotbar { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; pointer-events: all;
        }
        .slot { width: 40px; height: 40px; background: rgba(0,0,0,0.8); border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    </style>
</head>
<body>

<div id="viewport">
    <canvas id="game"></canvas>
    
    <div class="ui-layer">
        <div>GOLD: $<span id="gold">100</span></div>
        <div>HULL <div class="bar"><div id="hp" class="fill" style="background: #f05; width: 100%;"></div></div></div>
        <div>NRG  <div class="bar"><div id="nrg" class="fill" style="background: #0af; width: 100%;"></div></div></div>
        <div id="clock" style="position: absolute; top: 20px; right: 20px; font-size: 24px;">06:00</div>
    </div>

    <div id="shop">
        <h2 style="color: #ff00ff; margin-top: 0;">TERMINAL_v2.1</h2>
        <div style="margin-bottom: 10px;">SEEDS (5) - $20 <button class="btn" onclick="buy('seeds', 20)">BUY</button></div>
        <div style="margin-bottom: 10px;">MEDKIT - $50 <button class="btn" onclick="buy('hp', 50)">BUY</button></div>
        <div style="margin-bottom: 20px;">BATTERY - $30 <button class="btn" onclick="buy('nrg', 30)">BUY</button></div>
        <button class="btn" style="background: #444;" onclick="closeShop()">CLOSE</button>
    </div>

    <div id="hotbar">
        <div class="slot active-slot" id="s0">HOE</div>
        <div class="slot" id="s1">SEED</div>
        <div class="slot" id="s2">WTR</div>
        <div class="slot" id="s3">SWD</div>
        <div class="slot" id="s4">GET</div>
    </div>
</div>

<script>
/**
 * PIXEL ENGINE CORE
 */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
// Internal Low-Res Rendering (The "Pixel" look)
const RES_W = 320;
const RES_H = 240;
canvas.width = RES_W;
canvas.height = RES_H;

const TILE = 16;
const COLS = RES_W / TILE;
const ROWS = RES_H / TILE;

let state = {
    gold: 100, hp: 100, nrg: 100, seeds: 5,
    hour: 6, min: 0, day: 1,
    tool: 0, shopOpen: false, flash: 0
};

let player = { x: 10, y: 7, vx: 0, vy: 0, color: '#00f2ff' };
let grid = [];
let particles = [];
let enemies = [];

/**
 * INIT WORLD
 */
function init() {
    for(let y=0; y<ROWS; y++) {
        grid[y] = [];
        for(let x=0; x<COLS; x++) {
            grid[y][x] = { type: 'grass', tilled: false, watered: false, crop: null };
        }
    }
    spawnSlime();
    requestAnimationFrame(tick);
}

/**
 * GAME LOGIC
 */
function buy(type, cost) {
    if(state.gold >= cost) {
        state.gold -= cost;
        if(type === 'seeds') state.seeds += 5;
        if(type === 'hp') state.hp = Math.min(100, state.hp + 40);
        if(type === 'nrg') state.nrg = Math.min(100, state.nrg + 50);
        updateUI();
    }
}

function spawnSlime() {
    enemies.push({ x: Math.random()*RES_W, y: Math.random()*RES_H, hp: 20 });
}

function useTool() {
    if(state.nrg < 5) return;
    let tx = Math.floor(player.x);
    let ty = Math.floor(player.y);
    let cell = grid[ty][tx];

    if(state.tool === 0 && cell.type === 'grass') { // Hoe
        cell.type = 'dirt'; cell.tilled = true; state.nrg -= 2;
    } else if(state.tool === 1 && cell.tilled && !cell.crop && state.seeds > 0) { // Seed
        cell.crop = { stage: 0, age: 0 }; state.seeds--; state.nrg -= 3;
    } else if(state.tool === 2 && cell.tilled) { // Water
        cell.watered = true; state.nrg -= 1;
    } else if(state.tool === 3) { // Sword
        state.flash = 3; state.nrg -= 2;
        enemies.forEach((e, i) => {
            let d = Math.hypot(e.x - (player.x*TILE), e.y - (player.y*TILE));
            if(d < 25) { e.hp -= 10; if(e.hp <= 0) { enemies.splice(i,1); state.gold += 15; } }
        });
    } else if(state.tool === 4 && cell.crop && cell.crop.stage >= 3) { // Harvest
        cell.crop = null; cell.watered = false; state.gold += 40;
    }
    updateUI();
}

function nextDay() {
    state.day++; state.hour = 6; state.nrg = 100;
    grid.forEach(r => r.forEach(c => {
        if(c.crop && c.watered) {
            c.crop.age++;
            if(c.crop.age >= 2) { c.crop.stage = Math.min(3, c.crop.stage+1); c.crop.age = 0; }
        }
        c.watered = false;
    }));
    updateUI();
}

/**
 * RENDER LOOP
 */
function tick() {
    // Logic Update
    state.min += 0.5;
    if(state.min >= 60) { state.min = 0; state.hour++; }
    if(state.hour >= 24) nextDay();
    if(state.hour > 20 && enemies.length < 3 && Math.random() > 0.99) spawnSlime();

    enemies.forEach(e => {
        let dx = (player.x*TILE) - e.x;
        let dy = (player.y*TILE) - e.y;
        let dist = Math.hypot(dx, dy);
        if(dist < 100) { e.x += dx*0.01; e.y += dy*0.01; }
        if(dist < 10) state.hp -= 0.1;
    });

    // Draw
    ctx.fillStyle = '#050508';
    ctx.fillRect(0,0,RES_W,RES_H);

    // Tiles
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let c = grid[y][x];
            ctx.fillStyle = c.type === 'grass' ? '#1a241a' : (c.watered ? '#234' : '#321');
            ctx.fillRect(x*TILE, y*TILE, TILE-1, TILE-1);
            
            if(c.crop) {
                ctx.fillStyle = c.crop.stage === 3 ? '#ff0' : '#0f8';
                let s = c.crop.stage + 2;
                ctx.fillRect(x*TILE + 6, y*TILE + 6, s, s);
            }

            // Bed (0,0) and Shop (End)
            if(x===0 && y===0) { ctx.fillStyle = '#0af'; ctx.fillRect(x*TILE+2, y*TILE+2, 12, 12); }
            if(x===COLS-1 && y===ROWS-1) { ctx.fillStyle = '#f0f'; ctx.fillRect(x*TILE+2, y*TILE+2, 12, 12); }
        }
    }

    // Enemies
    ctx.fillStyle = '#f0f';
    enemies.forEach(e => ctx.fillRect(e.x, e.y, 6, 6));

    // Player
    ctx.fillStyle = player.color;
    if(state.flash > 0) { ctx.fillStyle = '#fff'; state.flash--; }
    ctx.fillRect(player.x*TILE + 2, player.y*TILE + 2, 12, 12);

    // Lighting
    let d = (state.hour >= 20 || state.hour < 6) ? 0.5 : (state.hour >= 18 ? 0.3 : 0);
    ctx.fillStyle = `rgba(0,0,20,${d})`;
    ctx.fillRect(0,0,RES_W,RES_H);

    updateUI();
    requestAnimationFrame(tick);
}

function updateUI() {
    document.getElementById('gold').innerText = Math.floor(state.gold);
    document.getElementById('hp').style.width = state.hp + "%";
    document.getElementById('nrg').style.width = state.nrg + "%";
    document.getElementById('clock').innerText = `${state.hour.toString().padStart(2,'0')}:${Math.floor(state.min).toString().padStart(2,'0')}`;
}

function closeShop() { document.getElementById('shop').style.display = 'none'; state.shopOpen = false; }

/**
 * INPUT
 */
window.addEventListener('keydown', e => {
    let ox = player.x, oy = player.y;
    if(e.key === 'w') player.y--;
    if(e.key === 's') player.y++;
    if(e.key === 'a') player.x--;
    if(e.key === 'd') player.x++;
    
    if(player.x < 0 || player.x >= COLS || player.y < 0 || player.y >= ROWS) { player.x = ox; player.y = oy; }

    if(['1','2','3','4','5'].includes(e.key)) {
        state.tool = parseInt(e.key)-1;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-slot'));
        document.getElementById('s'+state.tool).classList.add('active-slot');
    }

    if(e.code === 'Space') useTool();
    if(player.x === COLS-1 && player.y === ROWS-1) document.getElementById('shop').style.display = 'block';
    if(player.x === 0 && player.y === 0) nextDay();
});

init();
</script>
</body>
</html>
